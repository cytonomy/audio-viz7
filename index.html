<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>audio-viz7 — neural bursts</title>

  <!-- p5.js (matches audio-viz6 / volumetric-led) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/addons/p5.sound.min.js"></script>

  <!-- ESM module map. All ML/WASM deps load lazily and degrade gracefully. -->
  <script type="importmap">
  {
    "imports": {
      "meyda":       "https://esm.sh/meyda@5.6.3",
      "pitchy":      "https://esm.sh/pitchy@4.1.0",
      "@ricky0123/vad-web": "https://esm.sh/@ricky0123/vad-web@0.0.24"
    }
  }
  </script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { background: #000; overflow: hidden; width: 100%; height: 100%; font-family: 'Courier New', monospace; }
    body { touch-action: none; -webkit-user-select: none; user-select: none; }

    #hud {
      position: fixed; top: 12px; left: 12px;
      color: #888; font-size: 11px; line-height: 1.5; z-index: 10;
      pointer-events: none; transition: opacity 0.25s;
    }
    #hud .k { color: #0af; }
    #hud .title { color: #ccc; font-size: 13px; margin-bottom: 4px; }
    #hud.hidden { opacity: 0; }

    #entities {
      position: fixed; top: 12px; right: 12px;
      color: #888; font-size: 11px; line-height: 1.6; z-index: 10;
      pointer-events: none; text-align: right;
      transition: opacity 0.25s;
    }
    #entities .name { display: inline-block; min-width: 70px; text-align: left; }
    #entities .bar { display: inline-block; color: #444; }
    #entities .lit { color: #fff; }
    #entities.hidden { opacity: 0; }

    #start {
      position: fixed; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      color: #aaa; font-size: 14px; z-index: 100; cursor: pointer;
      background: radial-gradient(circle at center, #0a0f18 0%, #000 60%);
    }
    #start h1 { color: #0af; font-size: 22px; margin-bottom: 12px; font-weight: 400; letter-spacing: 0.1em; }
    #start p { color: #666; font-size: 12px; margin-top: 6px; }
    #start.hidden { display: none; }

    canvas { display: block; }

    /* ── Fullscreen toggle button (shared across the audio-viz series) ── */
    #fsBtn {
      position: fixed; bottom: 16px; right: 16px; z-index: 200;
      width: 40px; height: 40px; padding: 0;
      display: flex; align-items: center; justify-content: center;
      background: rgba(8,12,20,0.55); color: #8fb4d6;
      border: 1px solid rgba(120,160,200,0.30); border-radius: 8px;
      cursor: pointer; opacity: 0.45;
      -webkit-backdrop-filter: blur(4px); backdrop-filter: blur(4px);
      transition: opacity .2s, background .2s, color .2s, border-color .2s, transform .1s;
    }
    #fsBtn:hover { opacity: 1; background: rgba(18,26,40,0.85); color: #d6ecff; border-color: rgba(120,160,200,0.6); }
    #fsBtn:active { transform: scale(0.94); }
    #fsBtn svg { width: 20px; height: 20px; display: block; pointer-events: none; }
  </style>
</head>
<body>

<div id="start">
  <h1>AUDIO-VIZ7 · NEURAL BURSTS</h1>
  <p>tap / click anywhere to enable microphone</p>
  <p style="margin-top: 18px; color: #444; font-size: 10px;">drag to orbit · scroll to zoom · H toggles HUD · F fullscreen</p>
</div>

<div id="hud" class="hidden">
  <div class="title">audio-viz7</div>
  <div><span class="k">drag</span> orbit · <span class="k">scroll</span> zoom</div>
  <div><span class="k">H</span> hud · <span class="k">F</span> fullscreen</div>
  <div><span class="k">B</span> mute bands · <span class="k">N</span> noise filter · <span class="k">space</span> pause</div>
  <div id="hud-status" style="margin-top: 8px; color: #555;"></div>
</div>

<div id="entities" class="hidden"></div>

<script src="visual/palette.js?v=21"></script>
<script src="visual/voxels.js?v=21"></script>
<script src="visual/bursts.js?v=21"></script>
<script src="visual/render.js?v=21"></script>
<script src="audio/profiler.js?v=21"></script>
<script src="audio/entities.js?v=21"></script>
<script type="module" src="audio/loaders.js?v=21"></script>
<script src="sketch.js?v=21"></script>

<!-- ── Fullscreen toggle (shared across the audio-viz series) ── -->
<button id="fsBtn" title="Fullscreen (F)" aria-label="Toggle fullscreen">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 9V5a1 1 0 0 1 1-1h4M15 4h4a1 1 0 0 1 1 1v4M20 15v4a1 1 0 0 1-1 1h-4M9 20H5a1 1 0 0 1-1-1v-4"/></svg>
</button>
<script>
(function () {
  var btn = document.getElementById('fsBtn');
  if (!btn) return;
  var EXPAND = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 9V5a1 1 0 0 1 1-1h4M15 4h4a1 1 0 0 1 1 1v4M20 15v4a1 1 0 0 1-1 1h-4M9 20H5a1 1 0 0 1-1-1v-4"/></svg>';
  var COMPRESS = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 4v3a2 2 0 0 1-2 2H4M20 9h-3a2 2 0 0 1-2-2V4M15 20v-3a2 2 0 0 1 2-2h3M4 15h3a2 2 0 0 1 2 2v3"/></svg>';
  function generic() {
    var el = document.documentElement;
    if (!document.fullscreenElement) {
      (el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen || el.msRequestFullscreen).call(el);
    } else {
      (document.exitFullscreen || document.webkitExitFullscreen || document.msExitFullscreen).call(document);
    }
  }
  // Don't let the click/drag reach p5's canvas handlers underneath.
  ['mousedown', 'pointerdown', 'touchstart'].forEach(function (ev) {
    btn.addEventListener(ev, function (e) { e.stopPropagation(); }, { passive: false });
  });
  btn.addEventListener('click', function (e) {
    e.preventDefault(); e.stopPropagation();
    // Prefer the project's own toggle (it may also manage HUD/cursor); else generic.
    if (typeof window.toggleFullscreen === 'function') window.toggleFullscreen();
    else if (typeof window._toggleFullscreen === 'function') window._toggleFullscreen();
    else generic();
  });
  function syncIcon() { btn.innerHTML = document.fullscreenElement ? COMPRESS : EXPAND; }
  document.addEventListener('fullscreenchange', syncIcon);
  document.addEventListener('webkitfullscreenchange', syncIcon);
})();
</script>

</body>
</html>
